name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Check linting
        run: ruff check src/ notebooks/

      - name: Check formatting
        run: ruff format --check src/ notebooks/

  journal-check:
    name: Journal Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check JOURNAL.md updated
        run: |
          LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q "skip-journal"; then
            echo "Label skip-journal détecté — vérification ignorée."
            exit 0
          fi
          if git diff origin/main...HEAD --name-only | grep -q "^JOURNAL.md$"; then
            echo "JOURNAL.md mis à jour."
          else
            echo "::error::JOURNAL.md n'a pas été mis à jour."
            echo "Ajoutez une entrée dans JOURNAL.md ou appliquez le label 'skip-journal' pour les PRs triviales."
            exit 1
          fi

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short || test $? -eq 5
